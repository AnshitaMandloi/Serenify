<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Serenify</title>
  <meta name="description" content="Sign in to Serenify – your mood-aware music experience." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    /* ── Design Tokens (mirrored from style.css) ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-0:         #0a0a12;
      --bg-1:         #0f0f1e;
      --bg-2:         #14142a;
      --bg-3:         #1c1c38;
      --bg-card:      rgba(255,255,255,0.04);
      --glass:        rgba(255,255,255,0.06);
      --glass-border: rgba(255,255,255,0.1);

      --purple:       #7c3aed;
      --purple-lt:    #9d63f7;
      --purple-glow:  rgba(124,58,237,0.4);
      --accent:       #a78bfa;
      --teal:         #2dd4bf;
      --pink:         #f472b6;
      --cyan:         #38bdf8;

      --text-1: #f0f0f8;
      --text-2: #a0a0c0;
      --text-3: #666688;

      --radius-sm: 10px;
      --radius-md: 16px;
      --radius-lg: 22px;
      --radius-xl: 28px;
      --shadow-glow: 0 0 24px var(--purple-glow);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-0);
      color: var(--text-1);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── Animated Background ── */
    .bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      animation: orb-drift var(--dur, 12s) ease-in-out infinite alternate;
    }

    .bg-orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #7c3aed, transparent 70%);
      top: -120px; left: -100px;
      --dur: 14s;
    }
    .bg-orb-2 {
      width: 380px; height: 380px;
      background: radial-gradient(circle, #f472b6, transparent 70%);
      bottom: -80px; right: -60px;
      --dur: 10s;
    }
    .bg-orb-3 {
      width: 280px; height: 280px;
      background: radial-gradient(circle, #2dd4bf, transparent 70%);
      top: 50%; left: 55%;
      --dur: 18s;
    }

    @keyframes orb-drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.08); }
    }

    /* Subtle grid overlay */
    .bg-canvas::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* ── Waveform decoration ── */
    .wave-decoration {
      position: fixed;
      bottom: 0;
      left: 0; right: 0;
      height: 80px;
      display: flex;
      align-items: flex-end;
      gap: 3px;
      padding: 0 20px 12px;
      z-index: 0;
      opacity: 0.12;
      pointer-events: none;
    }
    .wave-bar {
      flex: 1;
      border-radius: 4px 4px 0 0;
      background: linear-gradient(to top, var(--purple), var(--pink));
      animation: wave-anim var(--d, 1s) ease-in-out infinite alternate;
    }
    @keyframes wave-anim {
      from { transform: scaleY(0.15); }
      to   { transform: scaleY(1); }
    }

    /* ── Login Card ── */
    .login-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 16px;
      animation: card-in .6s cubic-bezier(.215,.61,.355,1) both;
    }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(32px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .login-card {
      background: linear-gradient(145deg, rgba(20,20,42,0.92) 0%, rgba(28,28,56,0.85) 100%);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
      padding: 44px 40px 40px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        0 24px 80px rgba(0,0,0,0.6),
        0 0 0 1px rgba(255,255,255,0.04) inset,
        var(--shadow-glow);
      position: relative;
      overflow: hidden;
    }

    /* Glossy top sheen */
    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    }

    /* Purple accent corner glow */
    .login-card::after {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 180px; height: 180px;
      background: radial-gradient(circle, rgba(124,58,237,0.2) 0%, transparent 70%);
      pointer-events: none;
    }

    /* ── Brand Header ── */
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 36px;
      text-align: center;
    }

    .brand-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .logo-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--purple);
      box-shadow: 0 0 12px var(--purple);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { box-shadow: 0 0 8px var(--purple); }
      50%       { box-shadow: 0 0 22px var(--purple), 0 0 44px rgba(124,58,237,0.3); }
    }

    .logo-text {
      font-family: 'Outfit', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--purple-lt);
      letter-spacing: 0.5px;
    }

    /* Music note icon */
    .brand-icon-wrap {
      width: 64px; height: 64px;
      border-radius: 18px;
      background: rgba(124,58,237,0.15);
      border: 1px solid rgba(124,58,237,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      box-shadow: 0 0 28px rgba(124,58,237,0.2);
    }
    .brand-icon-wrap svg {
      width: 30px; height: 30px;
      color: var(--purple-lt);
    }

    .brand h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--text-1);
      margin-bottom: 8px;
      line-height: 1.2;
    }
    .brand p {
      font-size: 13.5px;
      color: var(--text-2);
      line-height: 1.55;
    }

    /* ── Form ── */
    .login-form { display: flex; flex-direction: column; gap: 20px; }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-2);
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      width: 16px; height: 16px;
      color: var(--text-3);
      pointer-events: none;
      transition: color .2s;
      flex-shrink: 0;
    }

    .form-group input {
      width: 100%;
      background: var(--bg-3);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      padding: 13px 14px 13px 42px;
      color: var(--text-1);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color .25s, box-shadow .25s, background .25s;
      -webkit-appearance: none;
    }
    .form-group input::placeholder { color: var(--text-3); }
    .form-group input:focus {
      border-color: var(--purple);
      background: rgba(28,28,56,0.9);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.18);
    }
    .form-group input:focus + .input-icon,
    .input-wrap:focus-within .input-icon {
      color: var(--purple-lt);
    }

    /* Password toggle */
    .toggle-pw {
      position: absolute;
      right: 14px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-3);
      padding: 0;
      display: flex;
      align-items: center;
      transition: color .2s;
    }
    .toggle-pw:hover { color: var(--text-2); }
    .toggle-pw svg { width: 16px; height: 16px; }

    /* ── Forgot Password ── */
    .form-extras {
      display: flex;
      justify-content: flex-end;
      margin-top: -8px;
    }
    .forgot-link {
      font-size: 12px;
      font-weight: 500;
      color: var(--purple-lt);
      text-decoration: none;
      transition: color .2s, opacity .2s;
      opacity: 0.8;
    }
    .forgot-link:hover { opacity: 1; color: var(--accent); }

    /* ── Submit Button ── */
    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, var(--purple) 0%, #9333ea 100%);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 14px 24px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s, filter .2s;
      box-shadow: 0 4px 24px rgba(124,58,237,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: 0.3px;
      position: relative;
      overflow: hidden;
      margin-top: 4px;
    }
    .btn-login::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      transition: left .5s;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 36px rgba(124,58,237,0.6);
      filter: brightness(1.08);
    }
    .btn-login:hover::before { left: 100%; }
    .btn-login:active { transform: translateY(0); }
    .btn-login svg { width: 16px; height: 16px; }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-3);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--glass-border);
    }

    /* ── Register Link ── */
    .register-prompt {
      text-align: center;
      font-size: 13.5px;
      color: var(--text-2);
    }
    .register-prompt a {
      color: var(--purple-lt);
      text-decoration: none;
      font-weight: 600;
      transition: color .2s;
    }
    .register-prompt a:hover { color: var(--accent); }

    /* ── Active Mood Badge (decorative) ── */
    .mood-badge-login {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.6px;
      color: var(--purple-lt);
      background: rgba(124,58,237,0.12);
      border: 1px solid rgba(124,58,237,0.28);
      padding: 5px 12px 5px 8px;
      border-radius: 20px;
      margin-bottom: 16px;
    }
    .mood-badge-login span.dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--purple-lt);
      display: inline-block;
      animation: pulse-dot 2s ease-in-out infinite;
      box-shadow: 0 0 6px var(--purple);
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 10px; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .login-card { padding: 36px 24px 32px; }
      .brand h1 { font-size: 22px; }
    }
  </style>
</head>
<body>

  <!-- Animated Background -->
  <div class="bg-canvas" aria-hidden="true">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
  </div>

  <!-- Bottom waveform decoration -->
  <div class="wave-decoration" aria-hidden="true" id="waveDecoration"></div>

  <!-- Login Card -->
  <main class="login-wrapper">
    <div class="login-card" role="main">

      <!-- Brand -->
      <div class="brand">
        <div class="brand-logo">
          <div class="logo-dot"></div>
          <span class="logo-text">Serenify</span>
        </div>

        <div class="mood-badge-login">
          <span class="dot"></span>
          WELCOME BACK
        </div>

        <div class="brand-icon-wrap">
          <!-- Music note SVG -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 18V5l12-2v13"/>
            <circle cx="6" cy="18" r="3"/>
            <circle cx="18" cy="16" r="3"/>
          </svg>
        </div>

        <h1>Sign in to your account</h1>
        <p>Your mood-aware music experience awaits.</p>
      </div>

      <!-- Form -->
      <form class="login-form" id="loginForm" action="/login" method="post" novalidate>

        <!-- Username -->
        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Enter your username"
              autocomplete="username"
              required
            />
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            />
            <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password visibility">
              <!-- Eye icon -->
              <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Extras -->
        <div class="form-extras">
          <a href="/forgot-password" class="forgot-link">Forgot password?</a>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-login" id="loginBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          Sign In
        </button>

        <!-- Divider -->
        <div class="divider">OR</div>

        <!-- Register -->
        <p class="register-prompt">
          Don't have an account?&nbsp;
          <a href="/register.html" id="registerLink">Create one free</a>
        </p>

      </form>
    </div>
  </main>

  <script>
    /* ── Wave bars ── */
    const waveCnt = document.getElementById('waveDecoration');
    const barCount = Math.floor(window.innerWidth / 10);
    for (let i = 0; i < barCount; i++) {
      const bar = document.createElement('div');
      bar.className = 'wave-bar';
      bar.style.setProperty('--d', (0.4 + Math.random() * 1.4).toFixed(2) + 's');
      bar.style.height = (20 + Math.random() * 60) + 'px';
      waveCnt.appendChild(bar);
    }

    /* ── Password toggle ── */
    const toggleBtn = document.getElementById('togglePw');
    const pwInput   = document.getElementById('password');
    const eyeIcon   = document.getElementById('eyeIcon');

    const eyeOpenPath  = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    const eyeClosePath = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;

    toggleBtn.addEventListener('click', () => {
      const isHidden = pwInput.type === 'password';
      pwInput.type = isHidden ? 'text' : 'password';
      eyeIcon.innerHTML = isHidden ? eyeClosePath : eyeOpenPath;
      toggleBtn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
    });

    /* ── Icon hover color sync ── */
    document.querySelectorAll('.input-wrap input').forEach(input => {
      const icon = input.parentElement.querySelector('.input-icon');
      input.addEventListener('focus', () => { if (icon) icon.style.color = 'var(--purple-lt)'; });
      input.addEventListener('blur',  () => { if (icon) icon.style.color = ''; });
    });
  </script>
</body>
</html>
